{% extends 'base.html' %}
{% block content %}

<div class="landing-container">
    <div class="landing-content">
        <h1 class="landing-title">Efficiently</h1>
        <p class="landing-description">Es un gestor de tareas diseñado para gestionar tus tareas y aumentar la eficiencia en tu día a día. ¡Disfruta de la aplicación!</p>
        
        <div class="landing-buttons">
            <a href="{% url 'iniciar_sesion' %}" class="landing-btn login-btn">
                <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
            </a>
            <a href="{% url 'registrarse' %}" class="landing-btn register-btn">
                <i class="fas fa-user-plus"></i> Registrarse
            </a>
        </div>
    </div>
</div>

<style>
    .landing-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 120px);
        padding: 2rem;
        background-color: var(--light);
    }

    .landing-content {
        max-width: 600px;
        text-align: center;
        padding: 2.5rem;
        background: white;
        border-radius: var(--border-radius);
        box-shadow: var(--box-shadow);
    }

    .landing-title {
        color: var(--primary);
        font-size: 2.5rem;
        margin-bottom: 1.5rem;
        font-weight: 700;
    }

    .landing-description {
        color: var(--dark);
        font-size: 1.1rem;
        line-height: 1.6;
        margin-bottom: 2.5rem;
    }

    .landing-buttons {
        display: flex;
        gap: 1.5rem;
        justify-content: center;
        flex-wrap: wrap;
    }

    .landing-btn {
        padding: 0.75rem 1.5rem;
        font-size: 1rem;
        font-weight: 600;
        border-radius: var(--border-radius);
        text-decoration: none;
        transition: var(--transition);
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
    }

    .login-btn {
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        color: white;
    }

    .login-btn:hover {
        background: linear-gradient(135deg, var(--secondary), var(--primary));
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(67, 97, 238, 0.3);
    }

    .register-btn {
        background: white;
        color: var(--primary);
        border: 2px solid var(--primary);
    }

    .register-btn:hover {
        background: var(--primary);
        color: white;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(67, 97, 238, 0.2);
    }

    @media (max-width: 768px) {
        .landing-container {
            padding: 1rem;
        }
        
        .landing-content {
            padding: 1.5rem;
        }
        
        .landing-buttons {
            flex-direction: column;
            gap: 1rem;
        }
        
        .landing-btn {
            width: 100%;
            justify-content: center;
        }
    }
</style>
{% endblock %}
